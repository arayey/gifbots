services:
  - type: web
    name: bottomi-web
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: BOT_API_SECRET
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_BOT_ID
        value: "1478760602322210949"
      - key: DISCORD_GUILD_ID
        value: "1478760819822170205"
      - key: DISCORD_CHANNEL_ID
        value: "1478760827875102784"
      - key: VERIFICATION_BASE_URL
        sync: false
      - key: VERIFY_TRIGGER
        value: "!verificar"

  - type: worker
    name: bottomi-bot
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm run bot:start
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_BOT_ID
        value: "1478760602322210949"
      - key: DISCORD_GUILD_ID
        value: "1478760819822170205"
      - key: DISCORD_CHANNEL_ID
        value: "1478760827875102784"
      - key: VERIFICATION_BASE_URL
        sync: false
      - key: VERIFY_TRIGGER
        value: "!verificar"
