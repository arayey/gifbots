<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord - Verificacion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="shell">
        <aside class="hero">
          <p class="hero-overline">Community Security</p>
          <h2 class="hero-title">Verificacion en progreso</h2>
          <p class="hero-text">
            Este portal valida automaticamente tu cuenta para continuar en el
            servidor.
          </p>
          <div class="hero-dots" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
        </aside>

        <section class="card">
          <header class="brand">
            <div class="logo-wrap" aria-hidden="true">VC</div>
            <div>
              <p class="eyebrow">Discord Verification Center</p>
              <h1>Verificacion de acceso</h1>
            </div>
          </header>

          <p class="desc">
            Estamos validando tu cuenta automaticamente. No cierres esta
            ventana.
          </p>

          <div class="progress" aria-hidden="true">
            <span class="bar"></span>
          </div>
          <p id="status" class="status" aria-live="polite"></p>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
